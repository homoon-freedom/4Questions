<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Work - 마음 기록 관리 도구</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #000000;
            --header-color: #2c3e50;
            --border-color: #edf2f7;
            --input-bg: #ffffff;
            --accent-color: #2980b9;
            --tab-inactive: #f1f1f1;
            --record-item-bg: #ffffff;
            --sub-label-color: #7f8c8d;
        }

        html, body { margin: 0; padding: 0; width: 100%; background-color: var(--bg-color); }
        body { font-family: 'Pretendard', -apple-system, sans-serif; color: var(--text-color); line-height: 1.6; font-size: 15px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; box-sizing: border-box; background-color: var(--container-bg); min-height: 100vh; box-shadow: 0 0 100px rgba(0,0,0,0.05); }
        
        .util-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--tab-inactive); padding: 10px 15px; border-radius: 12px; }
        .timer-group { display: flex; align-items: center; gap: 10px; }
        #timer-display { font-family: 'Courier New', monospace; font-size: 1.2em; font-weight: bold; color: var(--accent-color); min-width: 60px; }
        .util-btn { background: var(--accent-color); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .util-btn.secondary { background: #95a5a6; }

        .tabs { display: flex; gap: 5px; margin-bottom: 25px; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; background: var(--container-bg); z-index: 10; padding-top: 10px; }
        .tab-button { padding: 12px 15px; cursor: pointer; border: none; background: var(--tab-inactive); font-size: 14px; font-weight: bold; border-radius: 8px 8px 0 0; white-space: nowrap; flex: 1; transition: 0.3s; color: #7f8c8d; }
        .tab-button.active { background: var(--accent-color); color: #fff; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .tab-content.active { display: block; }

        .question-group { background: var(--record-item-bg); padding: 12px; border: 1px solid var(--border-color); border-left: 4px solid var(--accent-color); margin-bottom: 20px; border-radius: 0 5px 5px 0; position: relative; }
        label { font-weight: bold; color: var(--header-color); font-size: 1.05em; line-height: 1.4; }
        
        textarea { width: 100%; min-height: 100px; padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; resize: none; box-sizing: border-box; font-size: 15px; line-height: 1.6; background-color: var(--input-bg); color: #000000; transition: border 0.2s; }
        textarea::placeholder { color: #bdc3c7; font-size: 0.9em; font-style: normal; }
        
        .sub-label { font-size: 13px; color: var(--sub-label-color); margin-bottom: 6px; display: block; font-weight: 500; }
        .guide-text { font-size: 12px; color: #16a085; margin-bottom: 8px; display: block; font-style: normal; }
        .import-btn { background: var(--tab-inactive); color: var(--accent-color); border: 1px solid var(--accent-color); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; }

        .check-group { margin: 12px 0; display: flex; gap: 25px; align-items: center; background: var(--tab-inactive); padding: 10px; border-radius: 8px; }
        
        /* 생각 뒤집기 토글 스타일 */
        .turnaround-set { background: var(--tab-inactive); padding: 10px 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border-color); }
        .turnaround-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .turnaround-body { display: block; margin-top: 15px; animation: slideDown 0.3s ease-out; }
        .turnaround-set.collapsed .turnaround-body { display: none; }
        .toggle-icon::before { content: '▼'; font-size: 10px; color: var(--accent-color); transition: transform 0.3s; display: inline-block; }
        .collapsed .toggle-icon::before { content: '▶'; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-add-turn { background: #16a085; color: white; border: none; padding: 10px 20px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }

        .record-item { border: 1px solid var(--border-color); padding: 20px; margin-bottom: 25px; border-radius: 12px; background: var(--record-item-bg); position: relative; }
        .record-date { font-size: 13px; color: #94a3b8; margin-bottom: 12px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }

        .buttons { display: flex; flex-direction: column; gap: 12px; margin: 40px 0; padding-bottom: 60px; align-items: center; }
        .main-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 500px; }
        button.action-btn { padding: 16px; font-size: 15px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; transition: all 0.2s; }
        .btn-record { background-color: #27ae60; color: #fff; grid-column: span 2; }
        .btn-share { background-color: #fee500; color: #3c1e1e; }
        .btn-reset { background-color: #95a5a6; color: #fff; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #fff; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; gap: 15px; }

        .tag-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .tag-item { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--accent-color); font-size: 12px; cursor: pointer; color: var(--accent-color); }
        .tag-item.active { background: var(--accent-color); color: white; }
    </style>
</head>
<body>

<div id="loading">
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <div id="loading-text">이미지 생성 중...</div>
</div>

<div class="container" id="capture-target">
    <div class="util-bar">
        <div class="timer-group">
            <span id="timer-display">05:00</span>
            <button class="util-btn" id="timer-ctrl" onclick="toggleTimer()">시작</button>
            <button class="util-btn secondary" onclick="resetTimer()">리셋</button>
        </div>
        <div style="font-size: 12px; font-weight: bold; color: var(--accent-color);">괴로운 생각으로부터 자유로워지는 네 가지 질문</div>
    </div>

    <header style="margin-bottom: 30px; text-align: center;">
        <h1 style="margin: 0; font-size: 1.8em; color: var(--accent-color);">The Work (작업)</h1>
    </header>

    <div class="tabs" id="tab-nav">
        <button class="tab-button active" id="btn-step6" onclick="openTab(event, 'step6')">1단계: 판단</button>
        <button class="tab-button" id="btn-step4" onclick="openTab(event, 'step4')">2단계: 조사</button>
        <button class="tab-button" id="record-tab-btn" onclick="openTab(event, 'record-list')">기록 목록(0)</button>
    </div>

    <div id="step6" class="tab-content active capture-section">
        <div class="question-group">
            <label>어떤 분야에 대한 괴로움인가요? (태그)</label>
            <div class="tag-selector" id="keyword-tags">
                <div class="tag-item" onclick="toggleTag(this)">가족</div>
                <div class="tag-item" onclick="toggleTag(this)">직장/동료</div>
                <div class="tag-item" onclick="toggleTag(this)">연애/배우자</div>
                <div class="tag-item" onclick="toggleTag(this)">돈/경제력</div>
                <div class="tag-item" onclick="toggleTag(this)">건강/외모</div>
                <div class="tag-item" onclick="toggleTag(this)">자기자신</div>
            </div>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>1. 누가 당신을 화나게, 슬프게 하나요?</label>
                <button class="import-btn" onclick="copyToStep2(0)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: 나는 (이름)이 나를 무시해서 화가 난다."></textarea>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>2. 그 사람이 어떻게 변하기를 바라나요?</label>
                <button class="import-btn" onclick="copyToStep2(1)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: (이름)이 내 의견을 존중해주길 바란다."></textarea>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>3. 그 사람에게 줄 수 있는 조언은?</label>
                <button class="import-btn" onclick="copyToStep2(2)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: (이름)은 다른 사람의 말을 듣는 법을 배워야 한다."></textarea>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>4. 당신이 행복하기 위해 그가 무엇을 해야 하나요?</label>
                <button class="import-btn" onclick="copyToStep2(3)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: 그가 나에게 미안하다고 사과해야 한다."></textarea>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>5. 그 사람에 대한 당신의 생각은?</label>
                <button class="import-btn" onclick="copyToStep2(4)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: (이름)은 이기적이고 공감 능력이 부족한 사람이다."></textarea>
        </div>
        <div class="question-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <label>6. 다시는 경험하고 싶지 않은 상황은?</label>
                <button class="import-btn" onclick="copyToStep2(5)">+</button>
            </div>
            <textarea class="q-step1" oninput="handleInput(this)" placeholder="예: 나는 다시는 (이름)에게 무시당하고 싶지 않다."></textarea>
        </div>
    </div>

    <div id="step4" class="tab-content capture-section">
        <div class="question-group" style="border-left-color: #95a5a6;">
            <label style="color: #95a5a6;">0. 조사할 문장</label>
            <textarea class="q-step2" id="target-statement" oninput="handleInput(this)" placeholder="조사할 생각을 적으세요."></textarea>
        </div>
        <div class="question-group">
            <label>1. 그 생각이 진실인가요?</label>
            <div class="check-group">
                <input type="radio" name="q1" id="q1y" value="예" onchange="saveDraft()"><label for="q1y">예</label>
                <input type="radio" name="q1" id="q1n" value="아니오" onchange="saveDraft()"><label for="q1n">아니오</label>
            </div>
            <textarea class="q-step2" oninput="handleInput(this)" placeholder="진실인지 묻고 잠잠히 기다려 보세요."></textarea>
        </div>
        <div class="question-group">
            <label>2. 그게 진실이라는 것을 확실히 알 수 있나요?</label>
            <div class="check-group">
                <input type="radio" name="q2" id="q2y" value="예" onchange="saveDraft()"><label for="q2y">예</label>
                <input type="radio" name="q2" id="q2n" value="아니오" onchange="saveDraft()"><label for="q2n">아니오</label>
            </div>
            <textarea class="q-step2" oninput="handleInput(this)" placeholder="100% 확실한가요?"></textarea>
        </div>
        <div class="question-group">
            <label>3. 그 생각을 믿을 때 당신은 어떻게 반응하나요?</label>
            <textarea class="q-step2" oninput="handleInput(this)" placeholder="어떤 감정이 드나요? 몸의 어디에서 느껴지나요?"></textarea>
        </div>
        <div class="question-group">
            <label>4. 그 생각이 없다면 당신은 누구일까요?</label>
            <textarea class="q-step2" oninput="handleInput(this)" placeholder="그 사람 앞에서 그 생각이 없는 자신을 상상해 보세요."></textarea>
        </div>
        <div class="question-group" style="border-left-color: #16a085;">
            <label style="color: #16a085;">5. 생각 뒤집기 & 사례 찾기</label>
            <div id="turnaround-container" style="margin-top:10px;"></div>
            <button class="btn-add-turn" onclick="addTurnaroundSet()">+ 뒤집기 추가</button>
        </div>
    </div>

    <div id="record-list" class="tab-content">
        <div id="records-container"></div>
    </div>

    <div class="buttons" id="action-btns">
        <div class="main-btns">
            <button class="action-btn btn-record" onclick="addRecord()">기록 완료 및 저장</button>
            <button class="action-btn btn-share" onclick="shareAsImage()">이미지 저장/공유</button>
            <button class="action-btn btn-reset" onclick="resetForm()">전체 초기화</button>
        </div>
    </div>
</div>

<script>
    let records = JSON.parse(localStorage.getItem('theWorkRecords')) || [];
    let timerInterval = null;
    let secondsLeft = 300;
    
    const bgMusic = new Audio('https://orangefreesounds.com/wp-content/uploads/2019/09/deep-relaxing-music.mp3');
    bgMusic.loop = true;

    window.onload = () => {
        const draftStr = localStorage.getItem('theWorkDraft');
        if(!draftStr) {
            addTurnaroundSet("① 나에게로 돌려보기", "예: 내가 나를 무시한다.");
            addTurnaroundSet("② 타인에게로 돌려보기", "예: 내가 그를 무시한다.");
            addTurnaroundSet("③ 정반대로 돌려보기", "예: 그는 나를 무시하지 않는다.");
        }
        loadDraft();
        updateRecordUI();
    };

    function toggleTimer() {
        const btn = document.getElementById('timer-ctrl');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.innerText = "계속";
            bgMusic.pause();
        } else {
            btn.innerText = "정지";
            bgMusic.play().catch(e => console.log("음악 재생 실패"));
            timerInterval = setInterval(() => {
                secondsLeft--;
                updateTimerDisplay();
                if (secondsLeft <= 0) { 
                    clearInterval(timerInterval); 
                    timerInterval = null;
                    btn.innerText = "시작";
                    bgMusic.pause();
                    bgMusic.currentTime = 0;
                    alert("시간이 종료되었습니다."); 
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        secondsLeft = 300;
        updateTimerDisplay();
        document.getElementById('timer-ctrl').innerText = "시작";
        bgMusic.pause();
        bgMusic.currentTime = 0;
    }

    function updateTimerDisplay() {
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        document.getElementById('timer-display').innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    function openTab(evt, tabName) {
        document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
        document.querySelectorAll(".tab-button").forEach(tb => tb.classList.remove("active"));
        document.getElementById(tabName).classList.add("active");
        if(evt) evt.currentTarget.classList.add("active");
        window.scrollTo(0, 0);
    }

    function handleInput(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = (textarea.scrollHeight) + 'px';
        saveDraft();
    }

    function toggleTag(el) { el.classList.toggle('active'); saveDraft(); }

    function copyToStep2(idx) {
        const val = document.querySelectorAll('.q-step1')[idx].value;
        if(!val) return alert("내용을 입력해주세요.");
        document.getElementById('target-statement').value = val;
        alert("2단계 '조사할 문장'으로 복사되었습니다.");
        saveDraft();
    }

    // 뒤집기 섹션 토글 함수
    function toggleTurnaround(el) {
        const set = el.closest('.turnaround-set');
        set.classList.toggle('collapsed');
    }

    function addTurnaroundSet(title = "새로운 뒤집기", placeholderText = "뒤집힌 문장을 적어보세요.") {
        const container = document.getElementById('turnaround-container');
        const div = document.createElement('div');
        div.className = 'turnaround-set'; // 초기 상태는 펼침
        div.innerHTML = `
            <div class="turnaround-header" onclick="toggleTurnaround(this)">
                <span class="sub-label" style="margin-bottom:0; flex:1;">${title}</span>
                <span class="toggle-icon" style="margin-right:15px;"></span>
                <button onclick="event.stopPropagation(); this.parentElement.parentElement.remove(); saveDraft();" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:12px;">삭제</button>
            </div>
            <div class="turnaround-body">
                <textarea class="q-turnaround-text" oninput="handleInput(this)" placeholder="${placeholderText}"></textarea>
                <span class="guide-text">이 문장이 진실일 수 있는 구체적인 사례 3가지를 찾으세요:</span>
                <textarea class="q-turnaround-case" oninput="handleInput(this)" placeholder="사례 1, 2, 3..." style="min-height:80px; border-style:dashed;"></textarea>
            </div>
        `;
        container.appendChild(div);
        saveDraft();
    }

    function saveDraft() {
        const activeTags = Array.from(document.querySelectorAll('.tag-item.active')).map(el => el.innerText);
        const turnarounds = Array.from(document.querySelectorAll('.turnaround-set')).map(set => ({
            title: set.querySelector('.sub-label').innerText,
            text: set.querySelector('.q-turnaround-text').value,
            case: set.querySelector('.q-turnaround-case').value,
            isCollapsed: set.classList.contains('collapsed')
        }));
        const draft = {
            tags: activeTags,
            step1: Array.from(document.querySelectorAll('.q-step1')).map(el => el.value),
            step2_main: Array.from(document.querySelectorAll('.q-step2')).map(el => el.value),
            turnarounds: turnarounds,
            q1: document.querySelector('input[name="q1"]:checked')?.value,
            q2: document.querySelector('input[name="q2"]:checked')?.value
        };
        localStorage.setItem('theWorkDraft', JSON.stringify(draft));
    }

    function loadDraft() {
        const draftStr = localStorage.getItem('theWorkDraft');
        if(!draftStr) return;
        const draft = JSON.parse(draftStr);
        document.querySelectorAll('.tag-item').forEach(el => { if(draft.tags?.includes(el.innerText)) el.classList.add('active'); });
        const s1 = document.querySelectorAll('.q-step1');
        if(draft.step1) draft.step1.forEach((v, i) => { if(s1[i]) s1[i].value = v; });
        const s2m = document.querySelectorAll('.q-step2');
        if(draft.step2_main) draft.step2_main.forEach((v, i) => { if(s2m[i]) s2m[i].value = v; });
        
        if(draft.turnarounds && draft.turnarounds.length > 0) {
            document.getElementById('turnaround-container').innerHTML = '';
            draft.turnarounds.forEach(t => {
                addTurnaroundSet(t.title);
                const lastSet = document.getElementById('turnaround-container').lastElementChild;
                lastSet.querySelector('.q-turnaround-text').value = t.text;
                lastSet.querySelector('.q-turnaround-case').value = t.case;
                if(t.isCollapsed) lastSet.classList.add('collapsed');
            });
        }
        
        if(draft.q1) { const rb = document.querySelector(`input[name="q1"][value="${draft.q1}"]`); if(rb) rb.checked = true; }
        if(draft.q2) { const rb = document.querySelector(`input[name="q2"][value="${draft.q2}"]`); if(rb) rb.checked = true; }
        setTimeout(() => { document.querySelectorAll('textarea').forEach(t => { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }); }, 150);
    }

    function addRecord() {
        const draftStr = localStorage.getItem('theWorkDraft');
        if(!draftStr) return alert("내용 없음");
        const record = { id: Date.now(), date: new Date().toLocaleString(), ...JSON.parse(draftStr) };
        records.unshift(record);
        localStorage.setItem('theWorkRecords', JSON.stringify(records));
        localStorage.removeItem('theWorkDraft');
        alert("저장되었습니다.");
        location.reload();
    }

    function updateRecordUI() {
        const container = document.getElementById('records-container');
        document.getElementById('record-tab-btn').innerText = `기록 목록(${records.length})`;
        if(records.length === 0) { container.innerHTML = `<p style="text-align:center; margin-top:50px;">기록 없음</p>`; return; }
        container.innerHTML = records.map(rec => `
            <div class="record-item">
                <div class="record-date">${rec.date}</div>
                <div class="record-text">핵심: ${rec.step2_main[0] || '-'}</div>
                <button onclick="deleteRecord(${rec.id})" style="position:absolute; top:20px; right:20px; color:#e74c3c; border:none; background:none; font-weight:bold;">삭제</button>
            </div>
        `).join('');
    }

    function deleteRecord(id) { if(confirm("삭제?")) { records = records.filter(r => r.id !== id); localStorage.setItem('theWorkRecords', JSON.stringify(records)); updateRecordUI(); } }

    async function shareAsImage() {
        const loading = document.getElementById('loading');
        loading.style.display = 'flex';
        const sections = [{ id: 'step6', name: '1단계_판단' }, { id: 'step4', name: '2단계_조사' }];
        const capturedFiles = [];
        try {
            for (let i = 0; i < sections.length; i++) {
                const targetEl = document.getElementById(sections[i].id);
                const originalDisplay = targetEl.style.display;
                
                // 이미지 생성 시에는 일시적으로 모든 내용을 펼침
                const collapsedSets = targetEl.querySelectorAll('.turnaround-set.collapsed');
                collapsedSets.forEach(s => s.classList.remove('collapsed'));
                
                targetEl.style.display = 'block'; 
                const canvas = await html2canvas(targetEl, {
                    backgroundColor: '#ffffff',
                    scale: 3,
                    useCORS: true,
                    onclone: (clonedDoc) => {
                        const target = clonedDoc.getElementById(sections[i].id);
                        target.style.width = '800px';
                        target.style.padding = '40px';
                        target.querySelectorAll('textarea, label, span, div, p, h1, h2').forEach(el => {
                            el.style.color = '#000000';
                            el.style.fontWeight = '800';
                            if (el.tagName === 'TEXTAREA') { el.style.border = '2px solid #000'; el.style.webkitTextFillColor = '#000'; }
                        });
                    }
                });

                // 원래 상태로 복구
                collapsedSets.forEach(s => s.classList.add('collapsed'));
                targetEl.style.display = originalDisplay; 
                
                const dataUrl = canvas.toDataURL('image/png');
                const blob = await (await fetch(dataUrl)).blob();
                capturedFiles.push(new File([blob], `TheWork_${sections[i].name}.png`, { type: 'image/png' }));
            }
            if (navigator.share) {
                await navigator.share({ files: capturedFiles, title: 'The Work 기록' });
            } else {
                showMultiImageModal(capturedFiles);
            }
        } catch (e) { alert("이미지 생성 오류."); } finally { loading.style.display = 'none'; }
    }

    function showMultiImageModal(files) {
        const modal = document.createElement('div');
        modal.style = `position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; display:flex; flex-direction:column; align-items:center; overflow-y:auto; padding:20px;`;
        let imagesHtml = `<p style="color:white; margin-bottom:15px;">이미지를 길게 눌러 저장하세요</p>`;
        files.forEach(file => { imagesHtml += `<img src="${URL.createObjectURL(file)}" style="max-width:100%; border:2px solid #000; margin-bottom:20px; background:#fff;">`; });
        modal.innerHTML = imagesHtml + `<button onclick="this.parentElement.remove()" style="padding:15px 30px; background:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">닫기</button>`;
        document.body.appendChild(modal);
    }

    function resetForm() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
</script>
